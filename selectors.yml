selectors:
  - name: medallion_bronze
    description: All bronze layer models
    definition:
      method: tag
      value: bronze

  - name: medallion_silver
    description: All silver layer models
    definition:
      method: tag
      value: silver

  - name: medallion_gold
    description: All gold layer models
    definition:
      method: tag
      value: gold

  - name: medallion_all
    description: All medallion layer models
    definition:
      union:
        - method: tag
          value: bronze
        - method: tag
          value: silver
        - method: tag
          value: gold

  - name: snapshots
    description: All snapshot resources
    definition:
      method: resource_type
      value: snapshot

  - name: daily_refresh
    description: Models configured for daily frequency
    definition:
      method: config.meta.frequency
      value: daily
